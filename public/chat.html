<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleBot - Your AI Personal Shopper</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body" style="display:flex; flex-direction:column; height: 100vh; overflow: hidden; align-items: center;">
    
    <nav class="navbar" style="width: 100%; position: relative;">
        <a href="index.html" class="nav-logo" style="text-decoration:none; color:inherit;">StyleBot ✦</a>
        <div class="nav-links">
            <button id="new-chat-btn" class="nav-btn" style="border: none; cursor: pointer; font-family: inherit; font-size: 0.9rem; margin-right: 10px;">New Chat ✦</button>
            <span class="status"><span class="dot"></span> Online</span>
            <a href="shop.html">Shop Now</a>
            <a href="profile.html" style="color: var(--blush-pink);">Profile</a>
        </div>
    </nav>
        
    <div style="flex: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column; background: rgba(22, 22, 26, 0.7); backdrop-filter: blur(20px); border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 20px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
        <main class="chat-container" id="chat-container" style="flex: 1; overflow-y: auto;">
            <div class="message bot">
                <div class="avatar"></div>
                <div class="bubble">
                    Hey there! Welcome to StyleBot ✦ I'm your personal fashion assistant and I'm SO excited to help you look amazing!<br><br>
                    To get started, could you tell me your <strong>gender</strong>?
                </div>
            </div>
        </main>
        
        <div class="typing-indicator hidden" id="typing-indicator">
            <div class="avatar"></div>
            <div class="bubble typing">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="bottom-area">
            <div class="quick-chips" id="quick-chips">
                <button class="chip">Male</button>
                <button class="chip">Female</button>
                <button class="chip">Non-binary</button>
            </div>

            <div class="input-area" style="align-items: center;">

                <button id="mic-btn" style="background: var(--bg-panel); border: 1px solid var(--border-color); padding: 12px 16px; border-radius: 8px; color: var(--text-light); cursor: pointer; transition: border-color 0.2s;" title="Speak">
                    🎤
                </button>

                <input type="text" id="user-input" placeholder="Type your style preference..." autocomplete="off">
                <button id="send-btn">Send ➤</button>
            </div>
        </div>
    </div>


    <script src="app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDabzhKYknphhV7dUbN7pgcYB940e9z1-w",
            authDomain: "aistylebot-6e93b.firebaseapp.com",
            databaseURL: "https://aistylebot-6e93b-default-rtdb.firebaseio.com",
            projectId: "aistylebot-6e93b",
            storageBucket: "aistylebot-6e93b.firebasestorage.app",
            messagingSenderId: "29328792960",
            appId: "1:29328792960:web:f3ebc8afe0581dedb43565",
            measurementId: "G-1QZ0W9K5S4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Not logged in, redirect to login page
                window.location.href = 'login.html';
            } else {
                window.currentUserId = user.uid;
                window.dispatchEvent(new Event('userLoaded'));
            }
        });
    </script>
</body>
</html>
