<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StyleBot - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--bg-panel);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 24px;
            color: var(--text-light);
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .login-form input {
            padding: 14px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #1e1e1e;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .login-form input:focus {
            border-color: var(--deep-rose);
        }
        .btn-login {
            background: var(--deep-rose);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-login:hover {
            opacity: 0.9;
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-top: 10px;
            display: none;
        }
        .login-switch {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #b0b0b0;
        }
        .login-switch a {
            color: var(--blush-pink);
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 1.4rem; position: absolute; top: 20px; left: 20px;">← Back</a>
        <h2 id="form-title">Login to StyleBot</h2>
        <form class="login-form" id="auth-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-login" id="submit-btn">Login</button>
            <p class="error-msg" id="error-msg"></p>
        </form>
        <p class="login-switch" id="switch-mode">
            Don't have an account? <a id="toggle-auth">Sign Up</a>
        </p>
    </div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDabzhKYknphhV7dUbN7pgcYB940e9z1-w",
            authDomain: "aistylebot-6e93b.firebaseapp.com",
            databaseURL: "https://aistylebot-6e93b-default-rtdb.firebaseio.com",
            projectId: "aistylebot-6e93b",
            storageBucket: "aistylebot-6e93b.firebasestorage.app",
            messagingSenderId: "29328792960",
            appId: "1:29328792960:web:f3ebc8afe0581dedb43565",
            measurementId: "G-1QZ0W9K5S4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const toggleAuth = document.getElementById('toggle-auth');
        const errorMsg = document.getElementById('error-msg');
        const authForm = document.getElementById('auth-form');

        toggleAuth.addEventListener('click', () => {
            isLogin = !isLogin;
            formTitle.textContent = isLogin ? 'Login to StyleBot' : 'Sign Up for StyleBot';
            submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('switch-mode').innerHTML = isLogin 
                ? 'Don\'t have an account? <a id="toggle-auth" style="color: var(--blush-pink); cursor: pointer;">Sign Up</a>'
                : 'Already have an account? <a id="toggle-auth" style="color: var(--blush-pink); cursor: pointer;">Login</a>';
            
            // Reattach listener since innerHTML replaced it
            document.getElementById('toggle-auth').addEventListener('click', toggleAuth.click);
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                window.location.href = 'chat.html';
            } catch (error) {
                errorMsg.textContent = error.message.replace('Firebase: ', '');
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
            }
        });
    </script>
</body>
</html>
